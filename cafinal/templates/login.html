{% extends "base.html" %}
{% block title %}Login – CAFinalPro{% endblock %}
{% block body %}
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;margin:1rem;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:1.75rem;}
.logo span{color:var(--accent);}
h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:0.3rem;}
.sub{font-size:0.82rem;color:var(--muted);margin-bottom:1.5rem;}
.btn-submit{width:100%;background:var(--gradient);color:white;border:none;padding:0.78rem;border-radius:10px;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:0.5rem;}
.btn-submit:hover{opacity:0.88;}
.foot{text-align:center;font-size:0.82rem;color:var(--muted);margin-top:1.25rem;}
.foot a{color:var(--accent);}
</style>
<div class="box">
  <div class="logo"><a href="/">CA<span>Final</span>Pro</a></div>
  <h2>Welcome back</h2>
  <div class="sub">Sign in to continue your CA Final preparation.</div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="fg"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required autofocus></div>
    <div class="fg"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn-submit">Sign In →</button>
  </form>
  <div class="foot">Don't have an account? <a href="/signup">Sign up</a></div>
</div>
{% endblock %}
